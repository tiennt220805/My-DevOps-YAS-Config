apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/tiennt220805/My-DevOps-YAS-Config.git"
    targetRevision: HEAD
    path: apps
    directory:
      recurse: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
