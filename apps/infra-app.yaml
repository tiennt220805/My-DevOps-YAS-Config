apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-infra-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/tiennt220805/My-DevOps-YAS-Config.git"
    targetRevision: HEAD
    path: infrastructure
  destination:
    server: "https://kubernetes.default.svc"
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
